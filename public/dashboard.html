<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Live Stats - Cyber Awareness</title>
<style>
  :root { --bg:#0f172a; --card:#111827; --accent:#22d3ee; --muted:#94a3b8; --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:linear-gradient(135deg,#0f172a,#1e293b); color:#e2e8f0; min-height:100vh; padding:24px; }
  h1 { margin:0; font-size:26px; }
  header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
  .muted { color:var(--muted); font-size:14px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
  .card { background:rgba(17,24,39,.85); border:1px solid #1f2937; border-radius:14px; padding:20px; }
  .card h2 { margin:0 0 12px; font-size:18px; }
  .big { font-size:40px; font-weight:800; }
  .row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px dashed #1f2937; }
  .row:last-child { border-bottom:0; }
  .pill { padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; }
  .pill.ok { background:rgba(34,197,94,.15); color:var(--ok); }
  .pill.bad { background:rgba(239,68,68,.15); color:var(--bad); }
  .pill.warn { background:rgba(245,158,11,.15); color:var(--warn); }
  .pill.mute { background:rgba(148,163,184,.15); color:var(--muted); }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:10px 8px; border-bottom:1px solid #1f2937; }
  th { color:#cbd5e1; font-weight:600; }
  button { padding:9px 14px; border:1px solid #334155; background:#0b1220; color:#e2e8f0; border-radius:8px; cursor:pointer; font-size:14px; }
  button:hover { border-color:var(--accent); color:var(--accent); }
  button.danger { border-color:#7f1d1d; color:#fca5a5; }
  button.danger:hover { background:#7f1d1d22; color:#fecaca; }
  .bar-wrap { background:#0b1220; border-radius:8px; overflow:hidden; height:14px; margin-top:6px; display:flex; }
  .bar-seg { height:100%; }
  .bar-seg.ok { background:var(--ok); }
  .bar-seg.bad { background:var(--bad); }
  .bar-seg.warn { background:var(--warn); }
  .legend { display:flex; gap:10px; font-size:12px; color:var(--muted); margin-top:6px; flex-wrap:wrap; }
  .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:5px; vertical-align:middle; }
  .dot.ok { background:var(--ok); } .dot.bad { background:var(--bad); } .dot.warn { background:var(--warn); }
</style>
</head>
<body>
  <header>
    <div>
      <h1>Live Permission Stats</h1>
      <div class="muted">Auto-refreshes every 2 seconds</div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <span class="muted">Total responses: <strong id="total" style="color:#e2e8f0;">0</strong></span>
      <button id="refreshBtn">Refresh</button>
      <button id="resetBtn" class="danger">Reset</button>
    </div>
  </header>

  <div class="grid">
    <section class="card">
      <h2>Location permission</h2>
      <div class="row"><span><span class="dot ok"></span>Allowed</span><span id="loc-granted" class="big" style="font-size:28px;color:var(--ok)">0</span></div>
      <div class="row"><span><span class="dot bad"></span>Denied</span><span id="loc-denied" class="big" style="font-size:28px;color:var(--bad)">0</span></div>
      <div class="row"><span><span class="dot warn"></span>Dismissed / other</span><span id="loc-other" class="big" style="font-size:28px;color:var(--warn)">0</span></div>
      <div class="bar-wrap" id="loc-bar"></div>
      <div class="legend"><span><span class="dot ok"></span>Allowed</span><span><span class="dot bad"></span>Denied</span><span><span class="dot warn"></span>Other</span></div>
    </section>

    <section class="card">
      <h2>Microphone permission</h2>
      <div class="row"><span><span class="dot ok"></span>Allowed</span><span id="mic-granted" class="big" style="font-size:28px;color:var(--ok)">0</span></div>
      <div class="row"><span><span class="dot bad"></span>Denied</span><span id="mic-denied" class="big" style="font-size:28px;color:var(--bad)">0</span></div>
      <div class="row"><span><span class="dot warn"></span>Dismissed / other</span><span id="mic-other" class="big" style="font-size:28px;color:var(--warn)">0</span></div>
      <div class="bar-wrap" id="mic-bar"></div>
      <div class="legend"><span><span class="dot ok"></span>Allowed</span><span><span class="dot bad"></span>Denied</span><span><span class="dot warn"></span>Other</span></div>
    </section>

    <section class="card" style="grid-column: 1 / -1;">
      <h2>Recent responses</h2>
      <table>
        <thead>
          <tr><th>#</th><th>Name</th><th>Location</th><th>Microphone</th><th>Time</th></tr>
        </thead>
        <tbody id="recent-body">
          <tr><td colspan="5" class="muted">No responses yet.</td></tr>
        </tbody>
      </table>
    </section>
  </div>

<script>
const $ = (id) => document.getElementById(id);

function pill(status) {
  const map = {
    granted:    { cls:'ok',   txt:'Allowed' },
    denied:     { cls:'bad',  txt:'Denied' },
    dismissed:  { cls:'warn', txt:'Dismissed' },
    unsupported:{ cls:'mute', txt:'Unsupported' },
    unknown:    { cls:'mute', txt:'Unknown' },
  };
  const m = map[status] || map.unknown;
  return `<span class="pill ${m.cls}">${m.txt}</span>`;
}

function setBar(id, ok, bad, warn) {
  const total = ok + bad + warn;
  const el = $(id);
  if (total === 0) { el.innerHTML = ''; return; }
  const pct = (v) => (v/total*100).toFixed(1) + '%';
  el.innerHTML =
    `<div class="bar-seg ok"   style="width:${pct(ok)}"></div>` +
    `<div class="bar-seg bad"  style="width:${pct(bad)}"></div>` +
    `<div class="bar-seg warn" style="width:${pct(warn)}"></div>`;
}

function fmtTime(iso) {
  try { return new Date(iso).toLocaleTimeString(); } catch (e) { return iso; }
}

async function refresh() {
  try {
    const res = await fetch('/api/stats');
    const s = await res.json();
    $('total').textContent = s.total;

    const locOther = (s.location.dismissed||0) + (s.location.unsupported||0) + (s.location.unknown||0);
    const micOther = (s.microphone.dismissed||0) + (s.microphone.unsupported||0) + (s.microphone.unknown||0);

    $('loc-granted').textContent = s.location.granted || 0;
    $('loc-denied').textContent  = s.location.denied  || 0;
    $('loc-other').textContent   = locOther;

    $('mic-granted').textContent = s.microphone.granted || 0;
    $('mic-denied').textContent  = s.microphone.denied  || 0;
    $('mic-other').textContent   = micOther;

    setBar('loc-bar', s.location.granted||0, s.location.denied||0, locOther);
    setBar('mic-bar', s.microphone.granted||0, s.microphone.denied||0, micOther);

    const body = $('recent-body');
    if (!s.recent || s.recent.length === 0) {
      body.innerHTML = '<tr><td colspan="5" class="muted">No responses yet.</td></tr>';
    } else {
      body.innerHTML = s.recent.map((r, i) =>
        `<tr>
           <td>${s.total - i}</td>
           <td>${escapeHtml(r.name)}</td>
           <td>${pill(r.location)}</td>
           <td>${pill(r.microphone)}</td>
           <td class="muted">${fmtTime(r.timestamp)}</td>
         </tr>`
      ).join('');
    }
  } catch (e) {
    console.error('refresh failed', e);
  }
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, (c) => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

$('refreshBtn').addEventListener('click', refresh);
$('resetBtn').addEventListener('click', async () => {
  if (!confirm('Clear all responses? This cannot be undone.')) return;
  await fetch('/api/reset', { method:'POST' });
  refresh();
});

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
